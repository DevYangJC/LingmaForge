<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>灵码工坊 - 登录 / 注册</title>
  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>

<body>
  <!-- Inline SVG Symbols for Icons -->
  <svg width="0" height="0" style="position:absolute">
    <symbol id="envelope" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <rect x="2" y="4" width="20" height="16" rx="2" />
      <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
    </symbol>
    <symbol id="shield-key" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
      <circle cx="12" cy="11" r="3" />
      <path d="m14 13-1.5-1.5" />
    </symbol>
    <symbol id="shield-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
      <path d="m9 12 2 2 4-5" />
    </symbol>
    <symbol id="cube" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <path
        d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
      <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
      <line x1="12" y1="22.08" x2="12" y2="12" />
    </symbol>
    <symbol id="spark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <path d="M12 2 9 10 2 12l7 2 3 8 3-8 7-2-7-2-3-8Z" />
    </symbol>
    <symbol id="rocket" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <path d="M4.5 16.5c-1.5 1.5-2.5 3.5-2.5 5.5C4 22 6 21 7.5 19.5" />
      <path d="m12 12 4 4" />
      <path d="m16 8 4 4" />
      <path d="M13.5 6.5C15 5 18.5 3.5 21 2c-1.5 2.5-3 6-4.5 7.5" />
      <path d="m17 7-6.5 6.5c-1.2 1.2-2.5 1-3.5 0L6 12.5c-1-1-1.2-2.3 0-3.5L12.5 2.5" />
      <path d="M11.5 17.5c1.5.5 2.5 1.5 3 3" />
    </symbol>
    <symbol id="github" viewBox="0 0 24 24" fill="currentColor">
      <path
        d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />
    </symbol>
    <symbol id="wechat" viewBox="0 0 24 24" fill="currentColor">
      <path
        d="M8.28 1.96C3.99 1.96.5 4.96.5 8.67c0 2.12 1.15 4.02 2.94 5.3-.22.68-.78 2.4-.78 2.4s1.78-1.04 2.8-1.64c.89.26 1.83.4 2.82.4 4.29 0 7.78-3 7.78-6.7S12.57 1.96 8.28 1.96zm4.99 4.35c.43 0 .78.35.78.78s-.35.78-.78.78-.78-.35-.78-.78.35-.78.78-.78zm-5 0c.43 0 .78.35.78.78s-.35.78-.78.78-.78-.35-.78-.78.35-.78.78-.78zm10.23 5.3c.09.28.14.56.14.85 0 3.15-3.03 5.71-6.77 5.71-.85 0-1.66-.13-2.42-.35-.87.52-2.39 1.4-2.39 1.4s.48-1.46.3-2.04c-1.53-1.09-2.5-2.7-2.5-4.5 0-.58.1-1.14.29-1.67 1.55 1.55 3.82 2.5 6.36 2.5 3.65 0 6.64-1.97 6.99-4.85zm-4.33-1.65c.34 0 .61.27.61.61s-.27.61-.61.61-.61-.27-.61-.61.27-.61.61-.61zm-4.04 0c.34 0 .61.27.61.61s-.27.61-.61.61-.61-.27-.61-.61.27-.61.61-.61z" />
    </symbol>
    <symbol id="google" viewBox="0 0 24 24" fill="currentColor">
      <path
        d="M12.24 10.285V13.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.859-3.578-7.859-8s3.529-8 7.859-8c2.46 0 4.105 1.025 5.047 1.926l2.427-2.334C17.955.577 15.342 0 12.24 0 5.58 0 0 5.37 0 12s5.58 12 12.24 12c6.96 0 11.57-4.89 11.57-11.79 0-.79-.085-1.4-.19-1.925H12.24z" />
    </symbol>
    <symbol id="lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
      <path d="M7 11V7a5 5 0 0 1 10 0v4" />
    </symbol>
  </svg>

  <div class="auth-container">
    <!-- Background Layer with exact same scaling system -->
    <div class="auth-background-layer">
      <div class="aspect-ratio-cover">
        <img class="bg-cover-image" src="../assets/lingma-product-ui/auth-concepts/key-portal-assets/key-portal-background-16x9-left-v3-4K%E9%AB%98%E6%B8%85.png" alt="background">
        

        <div class="mascot-wrapper">
          <img class="floating-mascot"
            src="../assets/lingma-product-ui/auth-concepts/key-portal-assets/key-portal-mascot-exact-v2抠像.png"
            alt="灵码工坊 吉祥物">
        </div>
      </div>
    </div>

    <!-- Header -->
    <header class="auth-header">
      <div class="brand">
        <div class="brand-symbol">
          <img src="brand/lingma-forge-logo.png" alt="灵码工坊 Logo">
        </div>
        <div class="brand-text">灵码工坊</div>
      </div>
      <div class="header-menu">
        <a href="lingma-homepage.html" class="header-link">返回首页</a>
        <span class="header-sep">|</span>
        <a href="lingma-doc.html" class="header-link">帮助中心</a>
      </div>
    </header>

    <!-- Main Content Wrapper -->
    <main class="auth-main">
      <!-- Left Section: Mascot & Showcase -->
      <section class="auth-left-showcase">

        <!-- Text Showcase -->
        <div class="showcase-content">
          <h2 class="showcase-title">打开你的<span class="gradient-text">创意入口</span></h2>
          <p class="showcase-sub">连接你的项目、模型与创作世界</p>

          <!-- Features Horizontal List -->
          <div class="showcase-features">
            <div class="feature-col">
              <div class="feature-icon-wrapper">
                <svg class="icon feature-icon">
                  <use href="#cube" />
                </svg>
              </div>
              <div class="feature-info">
                <h3>项目云同步</h3>
                <p>多端实时同步</p>
              </div>
            </div>
            <div class="feature-col">
              <div class="feature-icon-wrapper">
                <svg class="icon feature-icon">
                  <use href="#spark" />
                </svg>
              </div>
              <div class="feature-info">
                <h3>AI 实时生成</h3>
                <p>对话驱动快速构建</p>
              </div>
            </div>
            <div class="feature-col">
              <div class="feature-icon-wrapper">
                <svg class="icon feature-icon">
                  <use href="#rocket" />
                </svg>
              </div>
              <div class="feature-info">
                <h3>一键运行部署</h3>
                <p>从开发到上线更简单</p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Right Section: Login Card -->
      <section class="auth-right-card">
        <div class="auth-card">
          <!-- Auth Tabs -->
          <div class="auth-tabs">
            <button class="auth-tab-btn active">登录</button>
            <button class="auth-tab-btn">注册</button>
          </div>

          <!-- Welcome Header & Form Container -->
          <div class="auth-form-wrapper">
            <!-- Welcome Header -->
            <div class="form-header">
              <div class="form-header-title-row">
                <div class="shield-badge">
                  <svg class="icon badge-icon">
                    <use href="#shield-check" />
                  </svg>
                </div>
                <h1>继续你的创作</h1>
              </div>
              <p>安全可靠的云端环境，守护你的每一次创意</p>
            </div>

            <!-- Login Input Fields Form -->
            <form class="auth-form" onsubmit="event.preventDefault();">
              <!-- Account / Phone Number Input -->
              <div class="input-group">
                <span class="input-icon">
                  <svg class="icon">
                    <use href="#envelope" />
                  </svg>
                </span>
                <input type="text" placeholder="邮箱 / 手机号" required />
              </div>

              <!-- Login Sub-tabs selector -->
              <div class="login-method-tabs">
                <button type="button" class="method-tab active">验证码登录</button>
                <button type="button" class="method-tab">密码登录</button>
              </div>

              <!-- Verification Code / Password Input -->
              <div class="input-group">
                <span class="input-icon">
                  <svg class="icon">
                    <use href="#shield-key" />
                  </svg>
                </span>
                <input type="text" placeholder="输入 6 位验证码" required />
                <button type="button" class="btn-get-code">获取验证码</button>
              </div>

              <!-- Remember Me & Forgot Password -->
              <div class="form-options">
                <label class="remember-me">
                  <input type="checkbox" checked />
                  <span class="custom-checkbox"></span>
                  记住我
                </label>
                <a href="#" class="forgot-pass-link">忘记密码</a>
              </div>

              <!-- Submit Button -->
              <button type="submit" class="btn-login-submit">
                <span>登录</span>
                <svg class="submit-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                  stroke-linecap="round" stroke-linejoin="round">
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                  <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
              </button>
            </form>

            <!-- Separator -->
            <div class="auth-divider">
              <span>或使用以下方式继续</span>
            </div>

            <!-- OAuth Options -->
            <div class="oauth-options">
              <button class="btn-oauth">
                <svg class="oauth-icon" style="color:#000">
                  <use href="#github" />
                </svg>
                GitHub
              </button>
              <button class="btn-oauth">
                <svg class="oauth-icon" style="color:#09bb07">
                  <use href="#wechat" />
                </svg>
                微信
              </button>
              <button class="btn-oauth">
                <svg class="oauth-icon">
                  <use href="#google" />
                </svg>
                Google
              </button>
            </div>

            <!-- Link to Switch to Registration -->
            <div class="register-prompt">
              还没有账号？ <a href="#" class="switch-to-register">立即注册</a>
            </div>
          </div>

          <!-- Bottom Security Status Tip -->
          <footer class="ssl-security-tip">
            <svg class="icon security-icon">
              <use href="#lock" />
            </svg>
            <span>安全连接已建立 SSL 加密保护中</span>
            <span class="pulse-dot"></span>
          </footer>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="auth-footer">
      <div class="footer-left">
        <span class="copyright">© 2025 灵码工坊 · 让创造更简单</span>
      </div>
      <div class="footer-right">
        <span class="status-indicator">
          <span class="status-dot"></span>
          在线状态：正常运行
        </span>
        <span class="footer-sep">|</span>
        <a href="#" class="footer-link">隐私政策</a>
        <span class="footer-sep">|</span>
        <a href="#" class="footer-link">用户协议</a>
      </div>
    </footer>
  </div>

  <script>
    // Visual tab toggle for Demo interactivity
    const tabBtns = document.querySelectorAll('.auth-tab-btn');
    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Dynamic visual update on Welcome Header text depending on state
        const headerTitle = document.querySelector('.form-header h1');
        const headerSub = document.querySelector('.form-header p');
        const submitBtnText = document.querySelector('.btn-login-submit span');
        const regPrompt = document.querySelector('.register-prompt');

        if (btn.textContent.trim() === '注册') {
          headerTitle.textContent = '加入灵码工坊';
          headerSub.textContent = '开始你的灵感设计，体验前所未有的开发体验';
          submitBtnText.textContent = '注册';
          regPrompt.innerHTML = '已有账号？ <a href="#" class="switch-to-login">立即登录</a>';

          // Re-bind dynamic click logic on prompt link
          bindSwitchLinks();
        } else {
          headerTitle.textContent = '继续你的创作';
          headerSub.textContent = '安全可靠的云端环境，守护你的每一次创意';
          submitBtnText.textContent = '登录';
          regPrompt.innerHTML = '还没有账号？ <a href="#" class="switch-to-register">立即注册</a>';

          bindSwitchLinks();
        }
      });
    });

    // Verification code and password login tabs toggle
    const methodTabs = document.querySelectorAll('.method-tab');
    methodTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        methodTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        const codeInputGroup = document.querySelectorAll('.auth-form .input-group')[1];
        const codeInput = codeInputGroup.querySelector('input');
        const iconUse = codeInputGroup.querySelector('use');
        const getCodeBtn = codeInputGroup.querySelector('.btn-get-code');

        if (tab.textContent.trim() === '密码登录') {
          codeInput.placeholder = '输入登录密码';
          codeInput.type = 'password';
          iconUse.setAttribute('href', '#shield-key');
          if (getCodeBtn) getCodeBtn.style.display = 'none';
        } else {
          codeInput.placeholder = '输入 6 位验证码';
          codeInput.type = 'text';
          iconUse.setAttribute('href', '#shield-key');
          if (getCodeBtn) getCodeBtn.style.display = 'block';
        }
      });
    });

    // Helper to switch tabs dynamically
    function bindSwitchLinks() {
      const regLink = document.querySelector('.switch-to-register');
      const loginLink = document.querySelector('.switch-to-login');

      if (regLink) {
        regLink.addEventListener('click', (e) => {
          e.preventDefault();
          const regTab = Array.from(tabBtns).find(btn => btn.textContent.trim() === '注册');
          if (regTab) regTab.click();
        });
      }
      if (loginLink) {
        loginLink.addEventListener('click', (e) => {
          e.preventDefault();
          const loginTab = Array.from(tabBtns).find(btn => btn.textContent.trim() === '登录');
          if (loginTab) loginTab.click();
        });
      }
    }

    // Initialize link binders
    bindSwitchLinks();

    // Automatically switch tabs if url hash is #register
    if (window.location.hash === '#register') {
      const regTab = Array.from(tabBtns).find(btn => btn.textContent.trim() === '注册');
      if (regTab) regTab.click();
    }
  </script>
</body>

</html>
